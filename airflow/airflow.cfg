# Airflow Configuration
# This file contains essential Airflow settings for the data pipeline

[core]
# Airflow home directory
airflow_home = ./airflow

# Dagbag import timeout (in seconds)
dagbag_import_timeout = 60

# Enable parallelization
parallelism = 8
max_active_runs_per_dag = 1

# Database backend
sql_alchemy_conn = sqlite:///./airflow/airflow.db

# Default timezone
default_timezone = UTC

[scheduler]
# How often to run the scheduler (in seconds)
scheduler_heartbeat_interval = 30

# Number of times to try to schedule each DAG file
num_runs = -1

# Max number of dagruns of each DAG to keep in the backend
max_dagruns_to_create_per_loop = 10

[webserver]
# Port for Airflow web server
web_server_port = 8080

# Host for Airflow web server
web_server_host = 0.0.0.0

# Base log folder
base_log_folder = ./airflow/logs

[logging]
# Logging level
logging_level = INFO

[security]
# Expose the configuration file in the web UI
expose_config = False

# Expose the environment variables in the web UI
expose_variables = False
